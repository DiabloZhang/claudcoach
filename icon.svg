<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main background gradient: deep navy → electric blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E2E"/>
      <stop offset="50%" style="stop-color:#0D1B4B"/>
      <stop offset="100%" style="stop-color:#091535"/>
    </linearGradient>
    <!-- Accent gradient: electric cyan to teal -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#00FFB2"/>
    </linearGradient>
    <!-- Orange accent for run -->
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF9F1C"/>
    </linearGradient>
    <!-- Purple for AI -->
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2FBE"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="roundedRect">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Background with rounded corners -->
  <g clip-path="url(#roundedRect)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Subtle radial glow in center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a3a6e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <rect width="1024" height="1024" fill="url(#centerGlow)"/>

    <!-- Background grid lines (tech feel) -->
    <g opacity="0.06" stroke="#00D4FF" stroke-width="1">
      <!-- Horizontal lines -->
      <line x1="0" y1="128" x2="1024" y2="128"/>
      <line x1="0" y1="256" x2="1024" y2="256"/>
      <line x1="0" y1="384" x2="1024" y2="384"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="640" x2="1024" y2="640"/>
      <line x1="0" y1="768" x2="1024" y2="768"/>
      <line x1="0" y1="896" x2="1024" y2="896"/>
      <!-- Vertical lines -->
      <line x1="128" y1="0" x2="128" y2="1024"/>
      <line x1="256" y1="0" x2="256" y2="1024"/>
      <line x1="384" y1="0" x2="384" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="640" y1="0" x2="640" y2="1024"/>
      <line x1="768" y1="0" x2="768" y2="1024"/>
      <line x1="896" y1="0" x2="896" y2="1024"/>
    </g>

    <!-- AI network nodes (background decoration) -->
    <g opacity="0.12" fill="#00D4FF">
      <circle cx="120" cy="180" r="4"/>
      <circle cx="280" cy="120" r="3"/>
      <circle cx="180" cy="320" r="3"/>
      <circle cx="900" cy="200" r="4"/>
      <circle cx="820" cy="350" r="3"/>
      <circle cx="950" cy="400" r="3"/>
      <circle cx="150" cy="800" r="4"/>
      <circle cx="300" cy="900" r="3"/>
      <circle cx="880" cy="820" r="4"/>
      <circle cx="750" cy="920" r="3"/>
    </g>
    <g opacity="0.07" stroke="#00D4FF" stroke-width="1.5">
      <line x1="120" y1="180" x2="280" y2="120"/>
      <line x1="120" y1="180" x2="180" y2="320"/>
      <line x1="280" y1="120" x2="180" y2="320"/>
      <line x1="900" y1="200" x2="820" y2="350"/>
      <line x1="900" y1="200" x2="950" y2="400"/>
      <line x1="150" y1="800" x2="300" y2="900"/>
      <line x1="880" y1="820" x2="750" y2="920"/>
    </g>

    <!-- ============================================ -->
    <!-- OUTER RING: tri-color arc (swim/bike/run) -->
    <!-- ============================================ -->

    <!-- Background ring -->
    <circle cx="512" cy="512" r="380" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.05"/>

    <!-- Swim arc (blue) - top third -->
    <path d="M 512 132 A 380 380 0 0 1 862 632" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>

    <!-- Bike arc (orange) - right-bottom third -->
    <path d="M 862 632 A 380 380 0 0 1 162 632" fill="none" stroke="url(#orange)" stroke-width="12" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>

    <!-- AI/Run arc (purple) - left third -->
    <path d="M 162 632 A 380 380 0 0 1 512 132" fill="none" stroke="url(#purple)" stroke-width="12" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>

    <!-- ============================================ -->
    <!-- CENTER EMBLEM -->
    <!-- ============================================ -->

    <!-- Center glowing circle bg -->
    <circle cx="512" cy="512" r="260" fill="#0a1535" opacity="0.95"/>
    <circle cx="512" cy="512" r="255" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.2"/>

    <!-- ============================================ -->
    <!-- SWIMMER silhouette (top, cyan) -->
    <!-- ============================================ -->
    <g transform="translate(512, 310)" filter="url(#shadow)">
      <!-- Head -->
      <circle cx="0" cy="-62" r="22" fill="url(#accent)" opacity="0.95"/>
      <!-- Body angled forward (swimmer position) -->
      <ellipse cx="0" cy="-20" rx="14" ry="36" transform="rotate(-15)" fill="url(#accent)" opacity="0.9"/>
      <!-- Arms: one forward, one back -->
      <!-- Forward arm -->
      <path d="M -10 -40 Q -60 -60 -90 -30" stroke="url(#accent)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.95"/>
      <!-- Back arm -->
      <path d="M 10 -30 Q 55 -10 75 -35" stroke="url(#accent)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.95"/>
      <!-- Legs/kick -->
      <path d="M -5 10 Q -25 40 -10 60" stroke="url(#accent)" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.9"/>
      <path d="M 5 12 Q 30 42 15 62" stroke="url(#accent)" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.9"/>
      <!-- Water wave line -->
      <path d="M -75 -8 Q -55 -20 -35 -8 Q -15 4 5 -8 Q 25 -20 45 -8 Q 65 4 85 -8" stroke="#00D4FF" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
    </g>

    <!-- ============================================ -->
    <!-- CYCLIST silhouette (bottom right, orange) -->
    <!-- ============================================ -->
    <g transform="translate(630, 620)" filter="url(#shadow)">
      <!-- Wheel back -->
      <circle cx="-55" cy="38" r="42" fill="none" stroke="url(#orange)" stroke-width="10" opacity="0.9"/>
      <!-- Wheel front -->
      <circle cx="58" cy="38" r="42" fill="none" stroke="url(#orange)" stroke-width="10" opacity="0.9"/>
      <!-- Wheel spokes (simple) -->
      <line x1="-55" y1="-4" x2="-55" y2="80" stroke="url(#orange)" stroke-width="3" opacity="0.5"/>
      <line x1="-97" y1="38" x2="-13" y2="38" stroke="url(#orange)" stroke-width="3" opacity="0.5"/>
      <line x1="58" y1="-4" x2="58" y2="80" stroke="url(#orange)" stroke-width="3" opacity="0.5"/>
      <line x1="16" y1="38" x2="100" y2="38" stroke="url(#orange)" stroke-width="3" opacity="0.5"/>
      <!-- Frame -->
      <path d="M -55 38 L 0 -5 L 58 38" stroke="url(#orange)" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
      <path d="M 0 -5 L 10 38" stroke="url(#orange)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.95"/>
      <!-- Handlebar -->
      <path d="M 58 38 L 68 -15 L 80 -10" stroke="url(#orange)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
      <!-- Seat post -->
      <path d="M 0 -5 L -8 -28" stroke="url(#orange)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
      <line x1="-18" y1="-28" x2="2" y2="-28" stroke="url(#orange)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
      <!-- Rider head -->
      <circle cx="72" cy="-28" r="16" fill="url(#orange)" opacity="0.95"/>
      <!-- Rider body -->
      <path d="M -8 -26 Q 30 -45 70 -26" stroke="url(#orange)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.9"/>
      <!-- Rider legs -->
      <path d="M 10 38 Q 20 15 -2 0" stroke="url(#orange)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.85"/>
    </g>

    <!-- ============================================ -->
    <!-- RUNNER silhouette (bottom left, purple) -->
    <!-- ============================================ -->
    <g transform="translate(390, 630)" filter="url(#shadow)">
      <!-- Head -->
      <circle cx="0" cy="-70" r="20" fill="url(#purple)" opacity="0.95"/>
      <!-- Body -->
      <path d="M 0 -50 L -5 0" stroke="url(#purple)" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.95"/>
      <!-- Forward arm -->
      <path d="M -3 -35 Q -45 -50 -50 -20" stroke="url(#purple)" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.9"/>
      <!-- Back arm -->
      <path d="M -3 -35 Q 35 -25 42 5" stroke="url(#purple)" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.9"/>
      <!-- Forward leg (up) -->
      <path d="M -5 0 Q -15 25 -35 35" stroke="url(#purple)" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.95"/>
      <path d="M -35 35 Q -48 45 -42 60" stroke="url(#purple)" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.9"/>
      <!-- Back leg (extended) -->
      <path d="M -5 0 Q 25 20 42 40" stroke="url(#purple)" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.95"/>
      <path d="M 42 40 Q 52 55 48 68" stroke="url(#purple)" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.9"/>
    </g>

    <!-- ============================================ -->
    <!-- CENTER: AI brain / pulse -->
    <!-- ============================================ -->

    <!-- Center AI glow -->
    <circle cx="512" cy="512" r="58" fill="#0a1535" opacity="1"/>
    <circle cx="512" cy="512" r="52" fill="url(#purple)" opacity="0.15"/>
    <circle cx="512" cy="512" r="52" stroke="url(#purple)" stroke-width="2" fill="none" opacity="0.6"/>

    <!-- AI pulse/heartrate line through center -->
    <path d="M 448 512 L 468 512 L 480 480 L 492 545 L 504 490 L 516 535 L 528 512 L 576 512"
          stroke="#A855F7" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"
          filter="url(#glow)" opacity="0.95"/>

    <!-- ============================================ -->
    <!-- TOP LABEL: "TRI" -->
    <!-- ============================================ -->
    <text x="512" y="180" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="48" fill="white" opacity="0.12" letter-spacing="12">TRIATHLON</text>

    <!-- ============================================ -->
    <!-- BOTTOM LABEL: "TriCoach" -->
    <!-- ============================================ -->
    <text x="512" y="890" text-anchor="middle"
          font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="64" letter-spacing="2">
      <tspan fill="url(#accent)">Tri</tspan><tspan fill="white" opacity="0.9">Coach</tspan>
    </text>

    <!-- "AI POWERED" subtitle -->
    <text x="512" y="935" text-anchor="middle"
          font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-weight="400" font-size="26" fill="white" opacity="0.4" letter-spacing="6">AI POWERED</text>

  </g>

  <!-- Icon border glow -->
  <rect x="4" y="4" width="1016" height="1016" rx="220" ry="220" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.15"/>
</svg>
